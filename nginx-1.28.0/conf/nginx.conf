events {
    worker_connections  1024;
}

http {
    # 服务器配置
    server {
        listen       80;
        server_name  localhost;

        # 前端静态资源配置
        location / {
            root   D:/code(idea)/check-repeat-frontend/dist; # 前端打包后的dist目录路径
            index  index.html;
            try_files $uri $uri/ /index.html; # 解决Vue Router History模式刷新404问题
        }

        # 反向代理：转发API请求到后端
        location /check/ {
            proxy_pass http://localhost:8080/; # 后端接口基础路径
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 错误页面配置
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}